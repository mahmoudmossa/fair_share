name: Monorepo Dynamic Branch Pipeline

# Trigger the Pipeline on any Push to any branch in the repository
on:
  push:
    branches:
      - '**' # Means all branches without exception

jobs:
  # 1. Validation stage (runs on all branches)
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: kuhnroyal/flutter-fvm-config-action@v2
      - uses: subosito/flutter-action@v2
        with: { flutter-version: ${{ env.FLUTTER_VERSION }} }
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run generate
      - run: melos run analyze

  # 2. Testing stage (runs on all branches after validation succeeds)
  test:
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: kuhnroyal/flutter-fvm-config-action@v2
      - uses: subosito/flutter-action@v2
        with: { flutter-version: ${{ env.FLUTTER_VERSION }} }
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run generate
      - run: melos run test:unit
      - run: dart pub global activate patrol_cli
      - run: patrol test --target integration_test/app_test.dart

  # 3. Release/Versioning stage (runs only on main branch)
  release:
    needs: test
    if: github.ref == 'refs/heads/main' # Run condition for main branch only
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
      - name: Run Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # 4. Build stage (depends on success and main branch condition)
  build:
    needs: release
    if: github.ref == 'refs/heads/main' && needs.release.outputs.new_version != ''
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: kuhnroyal/flutter-fvm-config-action@v2
      - uses: subosito/flutter-action@v2
        with: { flutter-version: ${{ env.FLUTTER_VERSION }} }
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run generate
      - name: Build Android (on Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: flutter build appbundle --build-name=${{ needs.release.outputs.new_version }}
      - name: Build iOS (on macOS)
        if: matrix.os == 'macos-latest'
        run: flutter build ipa --build-name=${{ needs.release.outputs.new_version }}
      - uses: actions/upload-artifact@v3
        with:
          name: app-builds
          path: build/

  # 5. Firebase Distribution (runs only on main branch)
  distribute-firebase:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v3
        with: { name: app-builds }
      - run: bundle exec fastlane android distribute_to_firebase

  # 6. Manual store publishing (runs only on main branch with manual approval)
  publish-stores:
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production_manual_approval 
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v3
        with: { name: app-builds }
      - name: Fastlane Publish Android
        run: bundle exec fastlane android deploy_play_store
      - name: Fastlane Publish iOS
        run: bundle exec fastlane ios deploy_app_store