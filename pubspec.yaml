name: fair_share
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

workspace:
  - packages/shared_ui
  - packages/design_system

dependencies:
  auto_route: ^11.1.0
  dartz: ^0.10.1
  easy_localization: ^3.0.8
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_riverpod: ^2.6.1
  get_it: ^7.7.0
  hooks_riverpod: ^2.6.1
  logger: ^2.7.0
  mason: ^0.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  clean_architecture_with_state_management:
  auto_route_generator: ^10.6.0
  build_runner: ^2.4.11
  melos: ^6.2.0

flutter:
  uses-material-design: true



melos:
  scripts:
    # Code generation across all packages
    generate:
      run: dart run build_runner build --delete-conflicting-outputs
      exec:
        concurrency: 1
      description: Run build_runner code generation in all packages

    # Unit tests across all packages
    test:unit:
      run: flutter test test/unit --coverage
      exec:
        concurrency: 4
        failFast: true
      packageFilters:
        dirExists: "test/unit"
      description: Run all unit tests across all packages

    # Widget & Golden tests in feature packages
    test:golden:
      run: flutter test test/widget
      exec:
        concurrency: 1
      packageFilters:
        scope: "features"
      description: Run golden and widget tests in all feature packages

    # Update golden baseline images
    test:golden:update:
      run: flutter test test/widget --update-goldens
      exec:
        concurrency: 1
      packageFilters:
        scope: "features"
      description: Update golden baseline screenshots

    # Lint and analyze all packages
    analyze:
      run: dart analyze --fatal-infos
      exec:
        concurrency: 4
      description: Analyze all packages for errors and warnings

    # Format all Dart files
    format:
      run: dart format . --line-length 80
      exec:
        concurrency: 4
      description: Format all Dart code

    # Check formatting without modifying
    format:check:
      run: dart format . --line-length 80 --set-exit-if-changed
      exec:
        concurrency: 4
      description: Verify formatting without applying changes

    # Clean all packages
    clean:
      run: flutter clean
      exec:
        concurrency: 4
      description: Clean all Flutter packages

    # Run the app in development flavor
    run:dev:
      run: flutter run --flavor development --target lib/main.dart
      packageFilters:
        scope: "app"
      description: Run the app in development mode

    # Build release APK for Android
    build:android:
      run: flutter build apk --flavor production --target lib/main.dart --release
      packageFilters:
        scope: "app"
      description: Build production APK

    # Build release IPA for iOS
    build:ios:
      run: flutter build ipa --flavor production --target lib/main.dart
      packageFilters:
        scope: "app"
      description: Build production IPA