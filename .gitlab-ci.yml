# # ==========================================
# # 5. RELEASE STAGE (Semantic Release Automation)
# # ==========================================

semantic-release:
  stage: release
  image: node:20-alpine
  variables:
    GL_TOKEN: "$GITLAB_TOKEN"
    GIT_AUTHOR_NAME: "semantic-release-bot"
    GIT_AUTHOR_EMAIL: "semantic-release-bot@users.noreply.gitlab.com"
    GIT_COMMITTER_NAME: "semantic-release-bot"
    GIT_COMMITTER_EMAIL: "semantic-release-bot@users.noreply.gitlab.com"
  before_script:
    - apk add --no-cache git bash openssh-client
    - npm install -g semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/changelog @semantic-release/exec @semantic-release/git @semantic-release/gitlab semantic-release-dart
    # Configure git to use GITLAB_TOKEN for authenticated pushes
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git config user.email "${GIT_COMMITTER_EMAIL}"
    - git config user.name "${GIT_COMMITTER_NAME}"
  script:
    - semantic-release
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /^chore\(release\)/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
  artifacts:
    when: always
    paths:
      - releaseNotes.md

# build android dev
build_android_dev:
  <<: *flutter_docker_generate_template
  stage: build
  script:
    - cd apps/app
    - flutter build apk --flavor development --target lib/main.dart --release --dart-define-from-file=$DEV_CONFIG
  artifacts:
    paths:
      - apps/app/build/app/outputs/flutter-apk/app-development-release.apk
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /^chore\(release\)/ && $CI_COMMIT_BRANCH == "main"
      when: never
    - if: $CI_COMMIT_TAG
      when: on_success
    - if: $CI_COMMIT_BRANCH
      when: manual
      allow_failure: true

# dev_firebase_distribution
firebase_distribution_android_dev: 
  stage: publish
  image: ruby:3.3
  dependencies:
    - build_android_dev
  script:
    - cd apps/app/android
    - gem install fastlane --no-document
    - cp $FASTLANE_ENV_DEV ./fastlane/.env
    - bundle exec fastlane distribute_to_firebase