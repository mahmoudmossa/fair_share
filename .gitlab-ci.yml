# GitLab CI/CD Pipeline Configuration for ITM Mobile App Monorepo
# This pipeline is optimized for Melos 7 Dart Workspace monorepos.

stages:
  - validate
  - test
  - release
  - build
  - publish

# Global cache configuration for pub-cache and build runner outputs
cache:
  key:
    files:
      - pubspec.lock
      - pubspec.yaml
  paths:
    - .pub-cache/
    - "**/ .dart_tool/"

# Global environment variables
variables:
  PUB_CACHE: "$CI_PROJECT_DIR/.pub-cache"
  FLUTTER_VERSION: "stable"

# Base anchor template for Dart/Flutter jobs running on Linux/Docker
.flutter_docker_template: &flutter_docker_template
  image: ghcr.io/cirruslabs/flutter:stable
  before_script:
    - export PATH="$PATH:$HOME/.pub-cache/bin"
    - export PATH="$PATH:$PUB_CACHE/bin"
    - dart pub global activate melos
    - melos bootstrap

# Extended template that also runs code generation (for build/deploy jobs)
.flutter_docker_generate_template: &flutter_docker_generate_template
  image: ghcr.io/cirruslabs/flutter:stable
  before_script:
    - export PATH="$PATH:$HOME/.pub-cache/bin"
    - export PATH="$PATH:$PUB_CACHE/bin"
    - dart pub global activate melos
    - melos bootstrap
    - melos run generate

# ==========================================
# 1. VALIDATION STAGE
# ==========================================

# Check formatting across all packages
format_check:
  <<: *flutter_docker_template
  stage: validate
  script:
    - melos run format:check
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /^chore\(release\)/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feat\//

# Static Analysis and Linters (custom_lint & DCM presets)
static_analysis:
  <<: *flutter_docker_template
  stage: validate
  script:
    - melos run analyze
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /^chore\(release\)/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feat\//

# ==========================================
# 2. TESTING STAGE
# ==========================================

# Run all unit tests concurrently
unit_tests:
  <<: *flutter_docker_template
  stage: test
  script:
    - melos run test:unit
  coverage: '/Lines\s*:\s*(\d+(?:\.\d+)?%)/'
  artifacts:
    name: "coverage-report"
    paths:
      - "**/coverage/"
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /^chore\(release\)/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feat\//

# Run widget & golden tests concurrently
widget_tests:
  <<: *flutter_docker_template
  stage: test
  script:
    - melos run test:golden
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /^chore\(release\)/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feat\//

# Run Patrol E2E Integration tests
patrol_tests:
  <<: *flutter_docker_template
  stage: test
  script:
    - dart pub global activate patrol_cli
    - export PATH="$PATH:$HOME/.pub-cache/bin"
    - cd apps/app
    - patrol test --target integration_test/app_flow_test.dart
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /^chore\(release\)/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

